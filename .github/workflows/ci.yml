name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  server:
    name: node_server (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: node_server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: node_server/package-lock.json

      # Skip the optional native serialport build — CI exercises simulate mode.
      - name: Install
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test
